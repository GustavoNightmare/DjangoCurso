{% extends 'layouts/base.html' %}
{% block content %}

<div class="container my-4">
    <h1 class="mb-4 text-center">Lista de Tareas</h1>
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-primary">
                        <tr>
                            <th>Título</th>
                            <th>Descripción</th>
                            <th>Proyecto</th>
                            <th class="text-center">Acciones</th>
                            <th class="text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for task in tasks %}
                        <tr id="task-{{ task.id }}">
                            <td>{{ task.title }}</td>
                            <td>{{ task.description }}</td>
                            <td>{{ task.projects.name }}</td>
                            <td class="text-center">
                                <button class="btn btn-outline-danger btn-sm delete-btn" data-task-id="{{ task.id }}">
                                    <i class="bi bi-trash"></i> Borrar
                                </button>
                                <button class="btn btn-outline-success btn-sm complete-btn"
                                    data-task-id="{{ task.id }}">
                                    {% if task.done %}
                                    <i class="bi bi-arrow-counterclockwise"></i> Pendiente
                                    {% else %}
                                    <i class="bi bi-check2-circle"></i> Completar
                                    {% endif %}
                                </button>
                            </td>
                            <td class="text-center status-cell">
                                {% if task.done %}
                                <span class="badge bg-success">Completada ✅</span>
                                {% else %}
                                <span class="badge bg-warning text-dark">Pendiente ❌</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    $(document).ready(function () {
        // Function to show alerts
        function showAlert(message, type = 'success') {
            const alertHtml = `<div class="alert alert-${type} alert-dismissible fade show" role="alert">
            ${message}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>`;
            $('.card-body').prepend(alertHtml);
        }

        $('.complete-btn').click(function () {
            var taskId = $(this).data('task-id');
            var button = $(this);
            var statusCell = $('#task-' + taskId + ' .status-cell');

            $.ajax({
                url: '/toggle_task/' + taskId + '/',
                method: 'POST',
                success: function (response) {
                    if (response.done) {
                        statusCell.html('<span class="badge bg-success">Completada ✅</span>');
                        button.html('<i class="bi bi-arrow-counterclockwise"></i> Pendiente');
                        showAlert('Estado de tarea actualizado a Completada', 'info');
                    } else {
                        statusCell.html('<span class="badge bg-warning text-dark">Pendiente ❌</span>');
                        button.html('<i class="bi bi-check2-circle"></i> Completar');
                        showAlert('Estado de tarea actualizado a Pendiente', 'info');
                    }
                },
                error: function (xhr, status, error) {
                    console.log('Error:', error);
                    showAlert('Error al actualizar el estado de la tarea', 'danger');
                }
            });
        });

        // Handle delete button click
        $('.delete-btn').click(function () {
            var taskId = $(this).data('task-id');
            var row = $('#task-' + taskId);

            // Show confirmation dialog
            if (confirm('¿Seguro que deseas eliminar esta tarea?')) {
                $.ajax({
                    url: '/delete_task/' + taskId + '/',
                    method: 'POST',
                    success: function (response) {
                        if (response.deleted) {
                            // Add fade-out animation and remove the row
                            row.addClass('fade-out');
                            setTimeout(() => row.remove(), 400);
                            showAlert('Tarea eliminada correctamente');
                        } else {
                            showAlert('No se pudo eliminar la tarea.', 'danger');
                        }
                    },
                    error: function (xhr, status, error) {
                        console.log('Delete error:', error);
                        showAlert('Error al intentar borrar la tarea.', 'danger');
                    }
                });
            }
        });
    });
</script>
{% endblock %}
